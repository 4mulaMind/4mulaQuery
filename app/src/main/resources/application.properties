/*
--------------------------------------------------
4mulaQuery API Configuration
--------------------------------------------------

Contains:
1. Server setup
2. Database connection
3. Hibernate/JPA settings
4. Gmail SMTP configuration

--------------------------------------------------
CLUE:
Spring Boot automatically reads this file
during application startup
--------------------------------------------------
*/

# --------------------------------------------------
# SERVER CONFIGURATION
# --------------------------------------------------

# Application running port
server.port=8080

# Application name
spring.application.name=4mulaQuery API


# --------------------------------------------------
# MYSQL DATABASE CONFIGURATION
# --------------------------------------------------

# MySQL connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/fourmulaquery_auth

# Database username
spring.datasource.username=root

# Database password
spring.datasource.password=

# MySQL JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# --------------------------------------------------
# HIBERNATE / JPA CONFIGURATION
# --------------------------------------------------

/*
ddl-auto=update

Automatically updates tables
according to entity classes

--------------------------------------------------
CLUE:
Useful during development
--------------------------------------------------
*/
spring.jpa.hibernate.ddl-auto=update

# Disable SQL query printing
spring.jpa.show-sql=false

# Hibernate MySQL dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --------------------------------------------------
# EMAIL CONFIGURATION (GMAIL SMTP)
# --------------------------------------------------

# Gmail SMTP host
spring.mail.host=smtp.gmail.com

# TLS SMTP port
spring.mail.port=587

# Sender Gmail account
spring.mail.username=4mulaMind@gmail.com

/*
Gmail App Password

--------------------------------------------------
CLUE:
Normal Gmail password work nahi karega

Google App Password required hota hai
--------------------------------------------------
*/
spring.mail.password=dtdqenzepwyigfkx

# Enable SMTP authentication
spring.mail.properties.mail.smtp.auth=true

# Enable TLS encryption
spring.mail.properties.mail.smtp.starttls.enable=true