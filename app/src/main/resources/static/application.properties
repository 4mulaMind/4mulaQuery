# ============================================================
# 4mulaQuery - Final Hybrid Docker Configuration
# ============================================================
# Project: 4mulaQuery Database Engine
# Author: Abdul Qadir
# Build: Maven (Java) + G++ (C++) | Runtime: Alpine JRE
# ============================================================

# ------------------------------------------------------------
# STAGE 1: BUILD ENVIRONMENT
# ------------------------------------------------------------
FROM maven:3.9.6-eclipse-temurin-17-alpine AS build

WORKDIR /workspace

# FIX: Alpine mein 'apk' use hota hai software install karne ke liye.
# build-base se G++ aur saari C++ libraries mil jayengi.
RUN apk add --no-cache g++ build-base

# Copying Source Code
COPY . .

# JAVA BUILD: Creating the API Jar
RUN mvn clean package -DskipTests

# C++ KERNEL BUILD: Compiling the B-Tree Engine
# Path assumes your .cpp files are in the 'core' folder.
RUN g++ -O3 core/*.cpp -o core/4mulaQuery

# ------------------------------------------------------------
# STAGE 2: RUNTIME ENVIRONMENT (Ultra-Slim & Secure)
# ------------------------------------------------------------
FROM eclipse-temurin:17-jre-alpine

WORKDIR /app

# C++ Runtime dependency for Alpine
RUN apk add --no-cache libstdc++

# Copying Artifacts from Build Stage
# Wildcard used to handle any version of the jar
COPY --from=build /workspace/target/*.jar app.jar
COPY --from=build /workspace/core/4mulaQuery ./core/4mulaQuery

# Permissions & DB Initialization
RUN chmod +x ./core/4mulaQuery && \
    touch 4mulaQuery.db && \
    chmod 666 4mulaQuery.db

# Networking
EXPOSE 8080
ENV PORT=8080

# Execution: Shell mode ensures ${PORT} expansion from environment
ENTRYPOINT ["sh", "-c", "java -Djava.security.egd=file:/dev/./urandom -Dserver.port=${PORT} -jar app.jar"]