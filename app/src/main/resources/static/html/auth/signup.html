<!-- ===================================================== -->
<!-- Signup Authentication Card -->
<!-- Purpose : New user registration interface -->
<!-- System  : 4mulaQuery - Intelligent Database Engine -->
<!-- ===================================================== -->

<div class="auth-card">

    <!-- ------------------------------------------------- -->
    <!-- Application Branding (Logo + Name + Tagline) -->
    <!-- ------------------------------------------------- -->
    <div class="auth-logo">
        <img src="/Logo.jpg" alt="4mulaQuery Logo">

        <!-- Application Name -->
        <h1>4mula<span>Query</span></h1>

        <!-- Tagline -->
        <p>// intelligent database engine</p>
    </div>

    <!-- ------------------------------------------------- -->
    <!-- Notification / Error Toast -->
    <!-- Displays signup errors or success messages -->
    <!-- ------------------------------------------------- -->
    <div id="signupToast" class="toast"></div>

    <!-- Page Title -->
    <div class="auth-title">Create account</div>

    <!-- Page Subtitle -->
    <div class="auth-sub">Join 4mulaQuery and start querying</div>

    <!-- ------------------------------------------------- -->
    <!-- Full Name Input -->
    <!-- ------------------------------------------------- -->
    <div class="field">
        <label>Full Name</label>
        <input 
            type="text"
            id="signupName"
            placeholder="Your name">
    </div>

    <!-- ------------------------------------------------- -->
    <!-- Email Input -->
    <!-- ------------------------------------------------- -->
    <div class="field">
        <label>Email</label>
        <input 
            type="email"
            id="signupEmail"
            placeholder="you@example.com">
    </div>

    <!-- ------------------------------------------------- -->
    <!-- Password Input -->
    <!-- Minimum length requirement -->
    <!-- ------------------------------------------------- -->
    <div class="field">
        <label>Password</label>
        <input 
            type="password"
            id="signupPass"
            placeholder="Min 6 characters">
    </div>

    <!-- ------------------------------------------------- -->
    <!-- Confirm Password Input -->
    <!-- Pressing Enter triggers signup -->
    <!-- ------------------------------------------------- -->
    <div class="field">
        <label>Confirm Password</label>
        <input 
            type="password"
            id="signupPass2"
            placeholder="Same as above"
            onkeydown="if (event.key === 'Enter') doSignup();">
    </div>

    <!-- ------------------------------------------------- -->
    <!-- Signup Button -->
    <!-- ------------------------------------------------- -->
    <button class="btn-primary" onclick="doSignup()">
        Create Account →
    </button>

    <!-- Divider -->
    <div class="auth-divider">or</div>

    <!-- ------------------------------------------------- -->
    <!-- Redirect to Login Page -->
    <!-- ------------------------------------------------- -->
    <div class="auth-link">
        Already have one?
        <a href="#" onclick="showPage('loginPage')">
            Sign in
        </a>
    </div>

</div>
