<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4mulaQuery | Intelligent Database Engine</title>

    <!-- Google Fonts: Poppins -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <style>
      /* ===============================
         GLOBAL STYLES
      ================================ */
      body {
        font-family: "Poppins", sans-serif;
        background: #f5f5dc;
        margin: 0;
        padding: 20px;
        color: #001f3f;
      }

      .container {
        max-width: 900px;
        margin: 40px auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        border: 2px solid #d4af37;
      }

      /* ===============================
         HEADER SECTION
      ================================ */
      .header-section {
        text-align: center;
        margin-bottom: 25px;
      }

      .header-logo {
        width: 120px;
        margin-bottom: 10px;
        border-radius: 12px;
        filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.2));
      }

      h1 {
        font-size: 2.8em;
        margin: 0;
      }

      h1 span {
        color: #d4af37;
      }

      #dynamic-text {
        font-size: 1.2em;
        color: #b29400;
        font-weight: bold;
        min-height: 1.5em;
        margin-bottom: 25px;
      }

      /* ===============================
         SECTIONS
      ================================ */
      .section {
        margin-bottom: 25px;
        padding: 20px;
        background: #fafafa;
        border-radius: 12px;
        border-left: 6px solid #001f3f;
      }

      /* ===============================
         FORM STYLES
      ================================ */
      .input-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      input {
        padding: 12px;
        border: 1px solid #d4af37;
        border-radius: 8px;
        flex: 1;
        min-width: 150px;
        outline: none;
      }

      button {
        padding: 12px 25px;
        background: #001f3f;
        color: #d4af37;
        border: 2px solid #d4af37;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      button:hover {
        background: #d4af37;
        color: #001f3f;
      }

      /* ===============================
         RESULTS / OUTPUT PANEL
      ================================ */
      #results {
        margin-top: 30px;
        padding: 20px;
        background: #001f3f;
        color: #f5f5dc;
        border-radius: 12px;
        font-family: "Courier New", monospace;
        min-height: 120px;
        border-left: 6px solid #d4af37;
        white-space: pre-wrap;
        overflow-y: auto;
        max-height: 320px;
      }

      .loader {
        color: #d4af37;
        font-style: italic;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <!-- ===============================
           HEADER SECTION
      ================================ -->
      <div class="header-section">
        <img src="/Logo.jpg" class="header-logo" alt="Logo" />
        <h1>4mula<span>Query</span></h1>
        <div id="dynamic-text"></div>
      </div>

      <!-- ===============================
           DATABASE OPERATIONS
      ================================ -->
      <div class="section">
        <h3>📥 Database Operations</h3>
        <div class="input-group">
          <input type="number" id="id" placeholder="ID (Required)" />
          <input type="text" id="name" placeholder="Name" />
          <input type="email" id="email" placeholder="Email" />
        </div>
        <div class="input-group" style="margin-top: 15px">
          <button onclick="operate('insert')">Insert</button>
          <button onclick="operate('search')">Search</button>
          <button onclick="operate('delete')">Delete</button>
        </div>
      </div>

      <!-- ===============================
           DATA EXPLORER
      ================================ -->
      <div class="section">
        <h3>📂 Data Explorer</h3>
        <button onclick="fetchAll()">Refresh Database View</button>
      </div>

      <!-- ===============================
           OUTPUT PANEL
      ================================ -->
      <div id="results">> Engine Ready. Waiting for command...</div>
    </div>

    <script>
      /* =================================================
         DYNAMIC HEADER TEXT TYPING EFFECT
      ================================================= */
      const phrases = [
        "Fastest C++ B-Tree Engine",
        "Developed by Abdul Qadir",
        "Spring Boot + Docker Integrated",
      ];
      let pIndex = 0,
        cIndex = 0,
        deleting = false;

      function type() {
        const text = phrases[pIndex];
        const target = document.getElementById("dynamic-text");
        target.textContent = deleting
          ? text.substring(0, cIndex--)
          : text.substring(0, cIndex++);

        if (!deleting && cIndex > text.length) {
          deleting = true;
          setTimeout(type, 2000);
        } else if (deleting && cIndex === 0) {
          deleting = false;
          pIndex = (pIndex + 1) % phrases.length;
          setTimeout(type, 500);
        } else {
          setTimeout(type, deleting ? 50 : 100);
        }
      }
      window.onload = type;

      /* =================================================
         DATABASE OPERATIONS (INSERT, SEARCH, DELETE)
      ================================================= */
      async function operate(type) {
        const id = document.getElementById("id").value;
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const resBox = document.getElementById("results");

        // ID validation
        if (!id || id <= 0) {
          alert("Valid ID required");
          return;
        }

        let url = `/api/${type}?id=${id}`;

        if (type === "insert") {
          if (!name || !email) {
            alert("Name and Email required");
            return;
          }
          url += `&name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}`;
        }

        // Show loader
        const start = performance.now();
        resBox.innerHTML = `<span class="loader">> Executing ${type.toUpperCase()}...</span>`;

        try {
          const response = await fetch(url);
          const data = await response.text();
          const time = (performance.now() - start).toFixed(2);
          resBox.innerHTML = `${data}\n\nExecuted in ${time} ms`;

          // Clear form and refresh all if insert success
          if (type === "insert" && data.includes("Executed")) {
            document.getElementById("id").value = "";
            document.getElementById("name").value = "";
            document.getElementById("email").value = "";
            setTimeout(fetchAll, 1000);
          }
        } catch (err) {
          resBox.innerHTML = `> Error: ${err}`;
        }
      }

      /* =================================================
         FETCH ALL DATA FROM DATABASE
      ================================================= */
      async function fetchAll() {
        const resBox = document.getElementById("results");
        resBox.innerHTML =
          '<span class="loader">> Scanning B-Tree Nodes...</span>';

        try {
          const response = await fetch("/api/all");
          const data = await response.text();

          if (!data || !data.trim()) {
            resBox.innerHTML = "> Database is empty.";
            return;
          }

          const rows = data.trim().split("\n");
          let table =
            "ID   | Username         | Email\n" + "-".repeat(50) + "\n";

          rows.forEach((row) => {
            const parts = row.split(",");
            if (parts.length >= 3) {
              table += `${parts[0].trim().padEnd(4)} | ${parts[1].trim().padEnd(16)} | ${parts[2].trim()}\n`;
            }
          });

          resBox.innerHTML = table;
        } catch (err) {
          resBox.innerHTML = `> Error: ${err}`;
        }
      }
    </script>
  </body>
</html>
