<!-- @format -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4mulaQuery | Database Engine</title>

    <link rel="icon" type="image/jpeg" href="/Logo.jpg" />
    <link rel="shortcut icon" href="/Logo.jpg" type="image/x-icon" />
    <link rel="apple-touch-icon" href="/Logo.jpg" />

    <style>
      /* CSS Section: Navy Blue (#001f3f), Gold (#d4af37), and Beige (#f5f5dc) */
      body {
        font-family: "Poppins", sans-serif;
        background-color: #f5f5dc;
        margin: 0;
        padding: 20px;
        color: #001f3f;
      }
      .container {
        max-width: 900px;
        margin: 40px auto;
        background: #ffffff;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.15);
        border: 2px solid #d4af37;
      }
      .header-section {
        text-align: center;
        margin-bottom: 20px;
      }
      .header-logo {
        width: 120px;
        margin-bottom: 10px;
        filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.2));
        border-radius: 12px;
      }
      h1 {
        font-size: 2.8em;
        margin: 0;
      }
      h1 span {
        color: #d4af37;
      }
      #dynamic-text {
        font-size: 1.2em;
        color: #b29400;
        font-weight: bold;
        min-height: 1.5em;
        margin-bottom: 30px;
        text-align: center;
      }
      .section {
        margin-bottom: 25px;
        padding: 20px;
        background: #fafafa;
        border-radius: 12px;
        border-left: 6px solid #001f3f;
      }
      .input-group {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      input {
        padding: 12px;
        border: 1px solid #d4af37;
        border-radius: 8px;
        flex: 1;
        min-width: 150px;
        outline: none;
      }
      button {
        padding: 12px 25px;
        background-color: #001f3f;
        color: #d4af37;
        border: 2px solid #d4af37;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }
      button:hover {
        background-color: #d4af37;
        color: #001f3f;
      }
      #results {
        margin-top: 30px;
        padding: 20px;
        background: #001f3f;
        color: #f5f5dc;
        border-radius: 12px;
        font-family: "Courier New", monospace;
        min-height: 120px;
        border-left: 6px solid #d4af37;
        white-space: pre-wrap;
        overflow-y: auto;
      }
      .loader {
        color: #d4af37;
        font-style: italic;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="header-section">
        <img src="/Logo.jpg" alt="4mulaQuery Logo" class="header-logo" />
        <h1>4mula<span>Query</span></h1>
        <div id="dynamic-text"></div>
      </div>

      <div class="section">
        <h3>📥 Database Operations</h3>
        <div class="input-group">
          <input type="number" id="id" placeholder="ID (Required)" />
          <input type="text" id="name" placeholder="Name (for Insert)" />
          <input type="email" id="email" placeholder="Email (for Insert)" />
        </div>
        <div class="input-group" style="margin-top: 15px">
          <button onclick="operate('insert')">Insert Record</button>
          <button onclick="operate('search')" style="background-color: #2980b9">
            Search ID
          </button>
          <button onclick="operate('delete')" style="background-color: #c0392b">
            Delete ID
          </button>
        </div>
      </div>

      <div class="section">
        <h3>📂 Data Explorer</h3>
        <button
          onclick="fetchAll()"
          style="background-color: #b29400; color: white; border: none"
        >
          Refresh Database View
        </button>
      </div>

      <div id="results">> Engine Ready. Waiting for command...</div>
    </div>

    <script>
      // 1. Typing Effect Logic
      const phrases = [
        "Fastest C++ B-Tree Engine",
        "Developed by Abdul Qadir",
        "Spring Boot + Docker Integrated",
      ];
      let pIdx = 0,
        cIdx = 0,
        isDel = false;

      function type() {
        const current = phrases[pIdx];
        const target = document.getElementById("dynamic-text");
        target.textContent = isDel
          ? current.substring(0, cIdx--)
          : current.substring(0, cIdx++);

        if (!isDel && cIdx > current.length) {
          isDel = true;
          setTimeout(type, 2000);
        } else if (isDel && cIdx === 0) {
          isDel = false;
          pIdx = (pIdx + 1) % phrases.length;
          setTimeout(type, 500);
        } else {
          setTimeout(type, isDel ? 50 : 100);
        }
      }
      window.onload = type;

      // 2. Main API Logic
      async function operate(type) {
        const id = document.getElementById("id").value;
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const resBox = document.getElementById("results");

        if (!id) {
          alert("Bhai, ID dalna zaroori hai!");
          return;
        }

        let url = `/api/${type}?id=${id}`;

        if (type === "insert") {
          if (!name || !email) {
            alert("Bhai, Insert ke liye Name aur Email dono chahiye!");
            return;
          }
          url += `&name=${name}&email=${email}`;
        }

        resBox.innerHTML = `<span class="loader">> Executing ${type.toUpperCase()} command...</span>`;

        try {
          const res = await fetch(url);
          const data = await res.text();

          resBox.innerHTML = `> ${data}`;

          if (type !== "search") {
            setTimeout(fetchAll, 1500);
          }
        } catch (err) {
          resBox.innerHTML = `> Error: ${err}`;
        }
      }

      // 3. Data View Refresh
      // 3. Data View Refresh (Updated for Comma Parsing)
      async function fetchAll() {
        const resBox = document.getElementById("results");
        resBox.innerHTML =
          '<span class="loader">> Scanning B-Tree Database Nodes...</span>';

        try {
          const res = await fetch("/api/all");
          const data = await res.text();

          // Check for empty or error response
          if (!data || data.trim() === "" || data.includes("No response")) {
            resBox.innerHTML = "> Database is empty or Engine mismatch.";
            return;
          }

          const lines = data.trim().split("\n");

          // ⭐ TABLE HEADER: Alignment ke liye padding use ki hai
          let formattedTable = "ID   | Username         | Email\n";
          formattedTable += "-".repeat(55) + "\n";

          lines.forEach((line) => {
            if (line.trim() !== "" && !line.includes("Unknown")) {
              // ⭐ MAGIC LINE: Comma se data ko todna
              const parts = line.split(",");

              if (parts.length >= 3) {
                // padEnd use kiya hai taaki columns ek ke niche ek sahi se aayein
                const id = parts[0].trim().padEnd(4);
                const name = parts[1].trim().padEnd(16);
                const email = parts[2].trim();

                formattedTable += `${id} | ${name} | ${email}\n`;
              } else {
                // Fallback agar format purana wala hi ho
                formattedTable += line + "\n";
              }
            }
          });

          resBox.innerHTML = formattedTable;
        } catch (err) {
          resBox.innerHTML = `> Error: ${err}`;
        }
      }
    </script>
  </body>
</html>
