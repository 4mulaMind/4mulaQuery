<!-- @format -->

<!-- ===== DASHBOARD SECTION ===== -->
<div id="sec-dashboard" class="section active">
  <!-- Section header -->
  <div class="page-hdr">
    <h2>Dashboard</h2>
    <p>Real-time control panel for your 4mulaQuery engine</p>
  </div>

  <!-- ===== Dashboard statistics cards ===== -->
  <div class="stats-row">
    <!-- Total Records card -->
    <div class="stat-card">
      <div class="s-label">Total Records</div>
      <div class="s-val" id="statTotal">—</div>
      <div class="s-desc">rows in database</div>
    </div>

    <!-- Last Operation card -->
    <div class="stat-card">
      <div class="s-label">Last Operation</div>
      <div class="s-val" id="statOp" style="font-size: 1rem; padding-top: 8px">
        —
      </div>
      <div class="s-desc">most recent command</div>
    </div>

    <!-- Engine Status card -->
    <div class="stat-card">
      <div class="s-label">Engine Status</div>
      <div class="s-live"><span class="dot-live"></span> ONLINE</div>
      <div class="s-desc">C++ core responding</div>
    </div>
  </div>

  <!-- ===== Database Operations Panel ===== -->
  <div class="panel">
    <!-- Panel title -->
    <div class="panel-title">
      <div class="p-dot"></div>
      Database Operations
    </div>

    <!-- Input fields for operations -->
    <div class="ops-grid">
      <div class="field">
        <label>ID *</label
        ><input type="number" id="opId" placeholder="e.g. 1" />
      </div>
      <div class="field">
        <label>Username</label
        ><input type="text" id="opName" placeholder="Name" />
      </div>
      <div class="field">
        <label>Email</label
        ><input type="email" id="opEmail" placeholder="user@email.com" />
      </div>

      <!-- Action buttons (Insert, Search, Delete) -->
      <div class="field">
        <label>&nbsp;</label>
        <div style="display: flex; gap: 8px">
          <button class="btn btn-ins" onclick="operate('insert')">＋</button>
          <button class="btn btn-src" onclick="operate('search')">⌕</button>
          <button class="btn btn-del" onclick="operate('delete')">✕</button>
        </div>
      </div>
    </div>

    <!-- Full width buttons for operations -->
    <div class="btn-row">
      <button class="btn btn-ins" onclick="operate('insert')">
        Insert Record
      </button>
      <button class="btn btn-src" onclick="operate('search')">
        Search by ID
      </button>
      <button class="btn btn-del" onclick="operate('delete')">
        Delete by ID
      </button>
      <button class="btn btn-ref" onclick="fetchAll()">↻ Refresh View</button>
    </div>
  </div>

  <!-- ===== Output Panel for Database Operations ===== -->
  <div class="out-panel">
    <div class="out-hdr">
      <span
        ><span
          class="dot-live"
          style="display: inline-block; margin-right: 6px"
        ></span
        >engine output</span
      >
      <button
        class="btn btn-ref"
        style="padding: 5px 12px; font-size: 0.75rem"
        onclick="fetchAll()"
      >
        ↻ Load All
      </button>
    </div>
    <div class="load-bar" id="lb1"></div>
    <div class="out-body" id="outBody">
      <div class="empty">
        <div class="empty-icon">◈</div>
        Engine ready. Run a command above.
      </div>
    </div>
  </div>
</div>
