<!-- ===================================================== -->
<!-- Forgot Password Authentication Card -->
<!-- Purpose : Allow users to reset their password securely -->
<!-- System  : 4mulaQuery - Intelligent Database Engine -->
<!-- ===================================================== -->

<div class="auth-card">

    <!-- ------------------------------------------------- -->
    <!-- Application Branding (Logo + Name + Tagline) -->
    <!-- ------------------------------------------------- -->
    <div class="auth-logo">
        <img src="/Logo.jpg" alt="4mulaQuery Logo">

        <!-- Application Name -->
        <h1>4mula<span>Query</span></h1>

        <!-- Tagline -->
        <p>// intelligent database engine</p>
    </div>

    <!-- ------------------------------------------------- -->
    <!-- Notification / Error Toast -->
    <!-- Displays OTP errors or password reset messages -->
    <!-- ------------------------------------------------- -->
    <div id="forgotToast" class="toast"></div>


    <!-- ================================================= -->
    <!-- STEP 1 : User enters email to receive OTP -->
    <!-- ================================================= -->
    <div id="fStep1">

        <div class="auth-title">Reset password</div>
        <div class="auth-sub">
            Enter your email to receive a verification code
        </div>

        <!-- Email Input -->
        <div class="field">
            <label>Email</label>
            <input 
                type="email"
                id="forgotEmail"
                placeholder="you@example.com">
        </div>

        <!-- Send OTP Button -->
        <button class="btn-primary" onclick="sendOtp()">
            Send Code →
        </button>

    </div>


    <!-- ================================================= -->
    <!-- STEP 2 : User enters OTP verification code -->
    <!-- ================================================= -->
    <div id="fStep2" style="display: none">

        <div class="auth-title">Enter OTP</div>
        <div class="auth-sub">
            Check your email for the 4-digit code
        </div>

        <!-- OTP Input Fields -->
        <div class="otp-row">
            <input type="text" maxlength="1" class="otp-input" oninput="otpNext(this, 0)">
            <input type="text" maxlength="1" class="otp-input" oninput="otpNext(this, 1)">
            <input type="text" maxlength="1" class="otp-input" oninput="otpNext(this, 2)">
            <input type="text" maxlength="1" class="otp-input" oninput="otpNext(this, 3)">
        </div>

        <!-- Verify OTP -->
        <button class="btn-primary" onclick="verifyOtp()">
            Verify →
        </button>

    </div>


    <!-- ================================================= -->
    <!-- STEP 3 : User sets a new password -->
    <!-- ================================================= -->
    <div id="fStep3" style="display: none">

        <div class="auth-title">New password</div>
        <div class="auth-sub">
            Set your new password
        </div>

        <!-- New Password -->
        <div class="field">
            <label>New Password</label>
            <input 
                type="password"
                id="newPass"
                placeholder="Min 6 characters">
        </div>

        <!-- Confirm Password -->
        <div class="field">
            <label>Confirm</label>
            <input 
                type="password"
                id="newPass2"
                placeholder="Same as above">
        </div>

        <!-- Update Password -->
        <button class="btn-primary" onclick="resetPass()">
            Update Password →
        </button>

    </div>


    <!-- Divider -->
    <div class="auth-divider"></div>

    <!-- ------------------------------------------------- -->
    <!-- Back to Login Link -->
    <!-- ------------------------------------------------- -->
    <div class="auth-link">
        <a href="#" onclick="showPage('loginPage')">
            ← Back to login
        </a>
    </div>

</div>
