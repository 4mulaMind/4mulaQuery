<!-- ===================================================== -->
<!-- Dashboard Section -->
<!-- Purpose : Real-time control panel for 4mulaQuery engine -->
<!-- System  : 4mulaQuery - Intelligent Database Engine -->
<!-- ===================================================== -->

<div id="sec-dashboard" class="section active">

    <!-- ------------------------------------------------- -->
    <!-- Page Header : Title + Description -->
    <!-- ------------------------------------------------- -->
    <div class="page-hdr">
        <h2>Dashboard</h2>
        <p>Real-time control panel for your 4mulaQuery engine</p>
    </div>

    <!-- ------------------------------------------------- -->
    <!-- Stats Row : Quick overview of key metrics -->
    <!-- ------------------------------------------------- -->
    <div class="stats-row">

        <!-- Total Records -->
        <div class="stat-card">
            <div class="s-label">Total Records</div>
            <div class="s-val" id="statTotal">—</div>
            <div class="s-desc">rows in database</div>
        </div>

        <!-- Last Operation -->
        <div class="stat-card">
            <div class="s-label">Last Operation</div>
            <div class="s-val" id="statOp" style="font-size:1rem;padding-top:8px">—</div>
            <div class="s-desc">most recent command</div>
        </div>

        <!-- Engine Status -->
        <div class="stat-card">
            <div class="s-label">Engine Status</div>
            <div class="s-live">
                <span class="dot-live"></span> ONLINE
            </div>
            <div class="s-desc">C++ core responding</div>
        </div>

    </div>

    <!-- ------------------------------------------------- -->
    <!-- Database Operations Panel -->
    <!-- Insert, Search, Delete operations -->
    <!-- ------------------------------------------------- -->
    <div class="panel">

        <div class="panel-title">
            <div class="p-dot"></div>Database Operations
        </div>

        <!-- Operations Input Grid -->
        <div class="ops-grid">

            <div class="field">
                <label>ID *</label>
                <input type="number" id="opId" placeholder="e.g. 1">
            </div>

            <div class="field">
                <label>Username</label>
                <input type="text" id="opName" placeholder="Name">
            </div>

            <div class="field">
                <label>Email</label>
                <input type="email" id="opEmail" placeholder="user@email.com">
            </div>

            <div class="field">
                <label>&nbsp;</label>
                <div style="display:flex;gap:8px">
                    <button class="btn btn-ins" onclick="operate('insert')">＋</button>
                    <button class="btn btn-src" onclick="operate('search')">⌕</button>
                    <button class="btn btn-del" onclick="operate('delete')">✕</button>
                </div>
            </div>

        </div>

        <!-- Operation Buttons Row -->
        <div class="btn-row">
            <button class="btn btn-ins" onclick="operate('insert')">Insert Record</button>
            <button class="btn btn-src" onclick="operate('search')">Search by ID</button>
            <button class="btn btn-del" onclick="operate('delete')">Delete by ID</button>
            <button class="btn btn-ref" onclick="fetchAll()">↻ Refresh View</button>
        </div>

    </div>

    <!-- ------------------------------------------------- -->
    <!-- Output Panel : Shows engine responses -->
    <!-- ------------------------------------------------- -->
    <div class="out-panel">

        <!-- Panel Header -->
        <div class="out-hdr">
            <span>
                <span class="dot-live" style="display:inline-block;margin-right:6px"></span>engine output
            </span>
            <button class="btn btn-ref" style="padding:5px 12px;font-size:0.75rem" onclick="fetchAll()">↻ Load All</button>
        </div>

        <!-- Loading Bar -->
        <div class="load-bar" id="lb1"></div>

        <!-- Output Body -->
        <div class="out-body" id="outBody">
            <div class="empty">
                <div class="empty-icon">◈</div>
                Engine ready. Run a command above.
            </div>
        </div>

    </div>

</div>
