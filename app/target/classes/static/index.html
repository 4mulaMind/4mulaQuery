<!-- =========================================================
     4mulaQuery — Main Application HTML
     ---------------------------------------------------------
     Author  : Abdul Qadir
     Version : 1.0

     Description
     ---------------------------------------------------------
     This file defines the full frontend UI structure of
     the 4mulaQuery intelligent database engine.

     Modules Used
     ---------------------------------------------------------
     index.html  → UI structure
     css/style.css → Styling and layout
     js/auth.js  → Authentication logic
     js/api.js   → Backend API communication
     js/app.js   → App initialization and navigation

     Theme
     ---------------------------------------------------------
     Navy + Gold luxury tech interface
========================================================= -->

<!doctype html>
<html lang="en">

<head>

  <!-- Character encoding -->
  <meta charset="UTF-8"/>

  <!-- Responsive layout for mobile devices -->
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>

  <!-- Page title -->
  <title>4mulaQuery | Intelligent Database Engine</title>

  <!-- Website favicon -->
  <link rel="icon" type="image/png" href="/Logo.jpg"/>

  <!-- Google Fonts used in UI -->
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>

  <!-- Main stylesheet -->
  <link rel="stylesheet" href="/css/style.css"/>

</head>

<body>

<!-- =====================================================
     BACKGROUND GRID EFFECT
     Decorative animated background used across UI
===================================================== -->
<div class="grid-bg"></div>


<!-- =====================================================
     LOGIN PAGE
     -----------------------------------------------------
     Allows existing users to log into the application.
     Includes email + password authentication.
===================================================== -->
<div id="loginPage" class="auth-wrap">

  <div class="auth-card">

    <!-- Application logo and branding -->
    <div class="auth-logo">
      <img src="/Logo.jpg" alt="4mulaQuery Logo"/>
      <h1>4mula<span>Query</span></h1>
      <p>// intelligent database engine</p>
    </div>

    <!-- Login error / success notification -->
    <div id="loginToast" class="toast error"></div>

    <!-- Page heading -->
    <div class="auth-title">Welcome back</div>
    <div class="auth-sub">Sign in to access your database</div>

    <!-- Email input -->
    <div class="field">
      <label>Email</label>
      <input type="email" id="loginEmail" placeholder="you@example.com"/>
    </div>

    <!-- Password input -->
    <div class="field">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••"
      onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>

    <!-- Password recovery link -->
    <div class="forgot-link">
      <a href="#" onclick="showPage('forgotPage')">Forgot password?</a>
    </div>

    <!-- Login button -->
    <button class="btn-primary" onclick="doLogin()">Sign In →</button>

    <!-- Divider -->
    <div class="auth-divider">or</div>

    <!-- Signup navigation -->
    <div class="auth-link">
      No account? 
      <a href="#" onclick="showPage('signupPage')">Create one</a>
    </div>

  </div>

</div>
