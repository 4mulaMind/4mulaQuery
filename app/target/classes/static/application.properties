# ============================================================
# 4mulaQuery - Application Configuration
# ============================================================

# 1. SERVER SETTINGS
# ------------------------------------------------------------
# Render par 'PORT' environment variable use hota hai. 
# Agar local hai toh default 8080 par chalega.
server.port=${PORT:8080}

# 2. SPRING BOOT CORE SETTINGS
# ------------------------------------------------------------
# Project ka naam jo logs mein dikhega
spring.application.name=4mulaQuery-API

# Static files (index.html, CSS, JS) ki location
spring.web.resources.static-locations=classpath:/static/

# 3. DATABASE ENGINE PATHS (Custom Properties)
# ------------------------------------------------------------
# Aapke C++ binary ka path. 
# Local: ./core/4mulaQuery
# Docker/Render: /app/4mulaQuery
database.engine.path=${ENGINE_PATH:./core/4mulaQuery}

# 4. LOGGING SETTINGS
# ------------------------------------------------------------
# Debugging ke liye logging level 'INFO' rakha hai
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# ============================================================
# End of Configuration
# ============================================================