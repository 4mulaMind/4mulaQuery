# ============================================================
# 4mulaQuery - System Configuration Registry
# ============================================================
#
# Project: 4mulaQuery Intelligent Engine
# Author: Abdul Qadir
# 
# Purpose:
# This file centralizes all environment-specific variables, 
# server tuning, and C++ Kernel path configurations.
#
# ============================================================

# ------------------------------------------------------------
# 1. SERVER NETWORK SETTINGS
# ------------------------------------------------------------
# Dynamic Port Binding: Prioritizes Cloud 'PORT' environment variable.
# Fallback: Defaults to 8080 for local development.
server.port=${PORT:8080}

# ------------------------------------------------------------
# 2. APPLICATION IDENTITY & RESOURCES
# ------------------------------------------------------------
# Core Metadata: Identity used in system logs and JMX beans.
spring.application.name=4mulaQuery-API

# Resource Mapping: Directing Spring Boot to the Royal Navy UI assets.
# Path: src/main/resources/static/
spring.web.resources.static-locations=classpath:/static/

# ------------------------------------------------------------
# 3. KERNEL BRIDGE CONFIGURATION (Custom Properties)
# ------------------------------------------------------------
# Binary Path: The location of the compiled C++ Database Engine.
# Local Environment:  ./core/4mulaQuery
# Production Environment: Override via ENGINE_PATH env variable.
database.engine.path=${ENGINE_PATH:./core/4mulaQuery}

# ------------------------------------------------------------
# 4. LOGGING & DIAGNOSTICS
# ------------------------------------------------------------
# Level: Set to INFO for a balance between detail and performance.
logging.level.org.springframework.web=INFO

# Format: Clean timestamp-based logging for terminal readability.
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [4mulaQuery] - %msg%n

# ============================================================
# END OF CONFIGURATION REGISTRY
# ============================================================